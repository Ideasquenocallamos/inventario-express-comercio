<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Express-Comercio</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 900px; 
            margin: auto; 
            padding: 20px; 
            background: var(--bg); 
            color: #334155;
        }

        h2 { text-align: center; color: #1e293b; }

        /* Estilos del Formulario */
        form { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px; 
        }

        .grid-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width { grid-column: span 2; }

        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }

        input, select { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            box-sizing: border-box;
            font-size: 1rem;
        }

        button { 
            cursor: pointer; 
            font-weight: 600; 
            transition: 0.2s; 
            border: none;
            border-radius: 6px;
        }

        .btn-submit { 
            background: var(--primary); 
            color: white; 
            padding: 12px; 
            margin-top: 10px;
            width: 100%;
        }

        .btn-submit:hover { opacity: 0.9; }

        /* Estilos de la Tabla */
        .table-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        table { width: 100%; border-collapse: collapse; }
        
        th { background: #f1f5f9; color: #475569; padding: 12px; text-align: left; }
        
        td { padding: 12px; border-top: 1px solid #f1f5f9; }

        .acciones { display: flex; gap: 8px; }

        .btn-edit { background: #e0f2fe; color: #0369a1; padding: 6px 12px; }
        .btn-delete { background: #fee2e2; color: #b91c1c; padding: 6px 12px; }

        .btn-edit:hover { background: #bae6fd; }
        .btn-delete:hover { background: #fecaca; }

        /* Responsivo */
        @media (max-width: 600px) {
            .grid-form { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <h2>📦 Inventario Express-Comercio</h2>
    
    <form id="productoForm">
        <input type="hidden" id="prodId">
        
        <div class="grid-form">
            <div class="full-width">
                <label for="nombre">Nombre del Producto</label>
                <input type="text" id="nombre" placeholder="Ej: Smartphone Samsung" required>
            </div>

            <div class="full-width">
                <label for="descripcion">Descripción</label>
                <input type="text" id="descripcion" placeholder="Detalles del producto..." required>
            </div>

            <div>
                <label for="precio">Precio ($)</label>
                <input type="number" id="precio" step="0.01" required>
            </div>

            <div>
                <label for="stock">Cantidad en Stock</label>
                <input type="number" id="stock" required>
            </div>

            <div class="full-width">
                <label for="categoria">Categoría</label>
                <select id="categoria">
                    <option value="Electrónica">Electrónica</option>
                    <option value="Ropa">Ropa</option>
                    <option value="Alimentos">Alimentos</option>
                    <option value="Hogar">Hogar</option>
                </select>
            </div>
        </div>

        <button type="submit" id="btnSubmit" class="btn-submit">Guardar Producto</button>
    </form>
    
    <div class="table-container">
        <table id="tablaProductos">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        const API_URL = 'http://localhost:4000/productos';
        const form = document.getElementById('productoForm');
        const btnSubmit = document.getElementById('btnSubmit');

        // 1. Obtener y mostrar productos
        async function cargarProductos() {
            try {
                const res = await fetch(API_URL);
                const productos = await res.json();
                const tbody = document.querySelector('#tablaProductos tbody');
                tbody.innerHTML = '';
                
                productos.forEach(p => {
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${p.nombre}</strong></td>
                            <td>${p.categoria}</td>
                            <td>$${p.precio}</td>
                            <td>${p.stock}</td>
                            <td class="acciones">
                                <button onclick="prepararEdicion('${p._id}')" class="btn-edit">Editar</button>
                                <button onclick="eliminar('${p._id}')" class="btn-delete">Eliminar</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error al cargar:", error);
            }
        }

        // 2. Preparar el formulario para editar
        async function prepararEdicion(id) {
            try {
                const res = await fetch(`${API_URL}/${id}`);
                const p = await res.json();

                document.getElementById('prodId').value = p._id;
                document.getElementById('nombre').value = p.nombre;
                document.getElementById('descripcion').value = p.descripcion;
                document.getElementById('precio').value = p.precio;
                document.getElementById('stock').value = p.stock;
                document.getElementById('categoria').value = p.categoria;

                btnSubmit.innerText = "Actualizar Producto";
                btnSubmit.style.background = "#16a34a"; // Color verde para edición
                window.scrollTo(0, 0); // Sube la pantalla al formulario
            } catch (error) {
                alert("Error al obtener los datos del producto");
            }
        }

        // 3. Crear o Actualizar Producto
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('prodId').value;
            const datos = {
                nombre: document.getElementById('nombre').value,
                descripcion: document.getElementById('descripcion').value,
                precio: Number(document.getElementById('precio').value),
                stock: Number(document.getElementById('stock').value),
                categoria: document.getElementById('categoria').value
            };

            const metodo = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            try {
                const response = await fetch(url, {
                    method: metodo,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                if (response.ok) {
                    form.reset();
                    document.getElementById('prodId').value = ""; 
                    btnSubmit.innerText = "Guardar Producto";
                    btnSubmit.style.background = ""; 
                    cargarProductos();
                }
            } catch (error) {
                alert("Error al guardar el producto");
            }
        });

        // 4. Eliminar Producto
        async function eliminar(id) {
            if(confirm('¿Seguro que deseas eliminar este producto?')) {
                try {
                    const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    if(res.ok) cargarProductos();
                } catch (error) {
                    alert("No se pudo eliminar");
                }
            }
        }

        // Carga inicial
        cargarProductos();
    </script>
</body>
</html>
